<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

  <label for="bits-input">Bits</label>
  <input
    id="bits-input"
    type="number"
    min="0"
    step="1"
    value="128"
  >

  <label for="encoded-value-input">Encoded value</label>
  <input
    id="encoded-value-input"
    type="text"
    inputmode="numeric"
    pattern="[0-9]*"
    value="340282366920938463463374607431768211455"
  >

  <div class="image-layout">
    <canvas id="image-canvas" width="512" height="512"></canvas>

    <section class="line-details">
      <h2>Lines</h2>
      <div id="line-details-list"></div>
    </section>
  </div>

  <script src="js/app.js"></script>

</body>

</html>
